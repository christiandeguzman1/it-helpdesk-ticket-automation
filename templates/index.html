<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Internal IT Helpdesk</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f7f7f7;
            margin: 0;
            padding: 0;
        }
        .container {
            max-width: 400px;
            margin: 48px auto;
            padding: 24px;
            background: #fff;
            border-radius: 6px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.07);
        }
        h1 {
            margin-bottom: 24px;
            font-size: 1.5em;
            text-align: center;
            color: #333;
        }
        label {
            display: block;
            margin-bottom: 6px;
            font-weight: bold;
        }
        input[type="text"], textarea {
            width: 100%;
            padding: 8px;
            margin-bottom: 18px;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-family: inherit;
        }
        textarea {
            resize: vertical;
            min-height: 70px;
        }
        button {
            width: 100%;
            padding: 10px;
            background: #266dd3;
            color: #fff;
            border: none;
            border-radius: 4px;
            font-size: 1em;
            cursor: pointer;
        }
        button:hover {
            background: #1a4c87;
        }
        .admin-link {
            display: block;
            text-align: center;
            margin-top: 18px;
            color: #266dd3;
            text-decoration: none;
        }
        .admin-link:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Internal IT Helpdesk</h1>
        <form action="/submit" method="POST">
            <label for="name">Name</label>
            <input type="text" id="name" name="name" required>

            <label for="description">Issue Description</label>
            <textarea id="description" name="description" required></textarea>

            <button type="submit">Submit Ticket</button>
        </form>
        <a class="admin-link" href="/admin">Go to Admin Panel</a>
    </div>
</body>
</html>
